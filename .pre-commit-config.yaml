# See https://pre-commit.com for more information
# Install: make pre-commit-install
#   (= pre-commit install + --hook-type commit-msg + --hook-type pre-push)
repos:
  # ── Commit message lint (Conventional Commits) ──
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        name: conventional commit check
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - build
          - refactor
          - test
          - perf
          - ci
          - chore

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        name: ruff check
        args: [--fix, --exit-non-zero-on-fix]
        stages: [pre-commit, pre-push]
      - id: ruff-format
        name: ruff format
        stages: [pre-commit, pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=5120]
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        language: system
        entry: bash -c 'cd apps/frontend && files=(); for f in "$@"; do files+=("${f#apps/frontend/}"); done; npx eslint --no-warn-ignored "${files[@]}"' --
        files: ^apps/frontend/.*\.(vue|ts|js|mjs)$
        types: [file]

      # Pre-push only: catch external-attack detection regressions locally before
      # they reach CI. Runs the same gate as CI (full frozen corpus, off-mode,
      # compared to baseline.json). Only fires when proxy source / benchmark code
      # changes. Skips cleanly if the proxy venv is not set up; bypass with
      # SKIP_BENCH=1 or `git push --no-verify`. ~2 min on Apple Silicon; on
      # CPU-only machines prefer SKIP_BENCH and rely on the CI gate.
      - id: bench-external-gate
        name: external attack regression gate (pre-push)
        language: system
        entry: scripts/bench-prepush.sh
        files: ^apps/proxy-service/(src|benchmarks)/.*\.(py|json|jsonl|ya?ml)$
        pass_filenames: false
        stages: [pre-push]
        verbose: true
