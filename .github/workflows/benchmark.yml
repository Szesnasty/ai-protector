name: Benchmark

on:
  # The benchmark is expensive, so it does NOT run on every push/PR. Trigger it by adding the
  # `run-benchmark` label to a PR, or run it manually (workflow_dispatch). The weekly schedule
  # only refreshes the dynamic badges.
  pull_request:
    types: [labeled]
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC — refreshes the dynamic badges
  workflow_dispatch:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── External deterministic attacks gate — opt-in via the `run-benchmark` label ──────
  detection-gate:
    name: External attack detection gate (proxy)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'run-benchmark')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/proxy-service
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      # Cache the heavy ML scanner models (~1 GB) so the gate stays fast.
      # NOTE: pin this to a full SHA per repo convention before merging.
      - name: Cache scanner models
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/llm_guard
            ~/.cache/torch
          key: scanner-models-${{ hashFiles('apps/proxy-service/pyproject.toml') }}
          restore-keys: scanner-models-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Verify corpus integrity
        run: python -m benchmarks.external.verify_manifest

      - name: Detection regression gate
        env:
          MODE: demo
        run: python -m benchmarks.bench_external --check-baseline --subset full --policy balanced

      # JailbreakBench regression gate (698 published artifacts, light ML layers,
      # mode-independent). Floor 95% vs the current ~99%. Adds ~5 min; scope this
      # to `if: github.event_name == 'push'` if PR latency becomes a concern.
      - name: JailbreakBench gate
        env:
          MODE: demo
        run: python -m benchmarks.bench_jailbreakbench --check-min 95

      # Publish the raw last-run reports so the numbers are auditable straight
      # from the run (not only the committed baseline). Uploaded even on failure.
      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results
          path: apps/proxy-service/benchmarks/results/*.json
          if-no-files-found: warn
          retention-days: 30

  # ── Publish dynamic badges (nightly / manual; never on PRs) ────────────
  publish-badges:
    name: Publish benchmark badges
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push to the orphan `badges` branch
    defaults:
      run:
        working-directory: apps/proxy-service
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Cache scanner models
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/llm_guard
            ~/.cache/torch
          key: scanner-models-${{ hashFiles('apps/proxy-service/pyproject.toml') }}
          restore-keys: scanner-models-

      - name: Install dependencies
        # The external-attacks badge runs the harm guard (--harm below), which
        # needs the transformers we benchmarked (5.3.0) for granite-guardian's
        # guardian_config chat template. pip ignores the [tool.uv] override, so
        # pin it explicitly here (replicates the Docker/dev environment).
        run: |
          pip install -e ".[dev]"
          pip install "transformers==5.3.0"

      - name: External deterministic attacks (max config)
        env:
          MODE: demo
        # --harm = HARM_ML_MODE=pre_llm → the badge advertises the max-config
        # detection rate (labelled "external attacks (max)").
        run: python -m benchmarks.bench_external --subset full --harm --emit-badge /tmp/badges/attack-detection.json

      - name: Internal scenario suite
        env:
          MODE: demo
        run: python -m benchmarks.bench_security --policy balanced --emit-badge /tmp/badges/internal-suite.json

      - name: JailbreakBench (NeurIPS 2024)
        env:
          MODE: demo
        run: python -m benchmarks.bench_jailbreakbench --emit-badge /tmp/badges/jailbreakbench.json

      - name: Publish to badges branch
        working-directory: /tmp/badges
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init -q
          git checkout -q -b badges
          git add .
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -q -m "chore(badges): update benchmark badges [skip ci]"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges
