name: Dependency Review

# DISABLED — re-enable when CI is fixed
# on:
#   pull_request:
#     branches: [main]
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Audit Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
