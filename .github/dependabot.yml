version: 2
# Security-only mode.
#
# Routine version-update PRs are disabled (open-pull-requests-limit: 0).
# Dependabot SECURITY updates still open automatically when a CVE affects a
# dependency (those are not governed by this limit). This keeps the repo patched
# against real vulnerabilities without the constant minor/patch churn — the
# pinned ML stack (llm-guard / presidio / litellm / transformers) over-pins
# itself, so routine bumps repeatedly turn into transitive-pin conflicts that
# aren't worth chasing on a solo-maintained repo.
updates:
  - package-ecosystem: pip
    directory: /apps/proxy-service
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: pip
    directory: /apps/agent-demo
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: npm
    directory: /apps/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: docker
    directory: /apps/proxy-service
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: docker
    directory: /apps/agent-demo
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: docker
    directory: /apps/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
